<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MLB Pitch Predictor — Live</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1f262e;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --amber: #f0b429;
      --green: #3fb950;
      --red: #f85149;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    html, body { background: var(--bg); color: var(--text); margin: 0; }
    body { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
           font-size: 13px; line-height: 1.45; padding: 16px 20px 80px; }
    header {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px; margin-bottom: 16px;
    }
    h1 { font-size: 15px; margin: 0; letter-spacing: 0.05em; }
    .badge {
      background: var(--panel-2); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 4px; font-size: 11px;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    }
    .badge.live { color: var(--red); border-color: var(--red); }
    .stamp { color: var(--muted); margin-left: auto; }
    button {
      font: inherit; background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .err {
      color: var(--red); background: var(--panel); border: 1px solid var(--red);
      padding: 8px 12px; border-radius: 4px; margin-bottom: 14px;
    }
    .empty {
      color: var(--muted); text-align: center; padding: 60px 20px;
      border: 1px dashed var(--border); border-radius: 6px;
    }
    .grid {
      display: grid; gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
    }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden;
    }
    .card-head {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      padding: 8px 12px; background: var(--panel-2);
      border-bottom: 1px solid var(--border);
    }
    .matchup { font-weight: 600; color: var(--text); }
    .sit { color: var(--muted); }
    .sit .count { color: var(--amber); font-weight: 600; }
    .sit .half { color: var(--accent); }
    .players {
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .players .label { color: var(--muted); }
    .players .name { color: var(--accent); font-weight: 600; }
    .players .vs { color: var(--muted); margin: 0 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td {
      text-align: left; padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 500; background: var(--panel-2);
         text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em; }
    tr:last-child td { border-bottom: none; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.neg { color: var(--muted); }
    .pa-log {
      padding: 6px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .pa-log .pa-empty { color: var(--muted); font-style: italic; }
    .pitch {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .pitch .num { color: var(--muted); }
    .pitch .type { color: var(--accent); font-weight: 600; }
    .pitch .spd { color: var(--amber); }
    .pitch .res { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>MLB PITCH PREDICTOR</h1>
    <span class="badge live">LIVE</span>
    <span class="badge" id="countBadge">0 games</span>
    <button id="refreshBtn">Refresh</button>
    <span class="stamp">Updated: <span id="stamp">—</span></span>
  </header>

  <div id="err"></div>
  <div id="content"></div>

<script>
const API = "http://localhost:8001";
const REFRESH_MS = 8000;

const MARKET_LABEL = {
  pitch_speed_ou: "Pitch Speed O/U",
  pitch_result:   "Pitch Result",
  ab_result:      "At-Bat Result",
  ab_pitches_ou:  "AB Pitches O/U",
};

const $ = (id) => document.getElementById(id);

function setText(id, txt) { $(id).textContent = txt; }

function fmtNum(v, digits = 2) {
  if (v === null || v === undefined) return "—";
  if (typeof v !== "number") return String(v);
  return v.toFixed(digits);
}

function fmtPct(v, digits = 1) {
  if (v === null || v === undefined) return "—";
  return (v * 100).toFixed(digits) + "%";
}

function fmtPrediction(m) {
  if (m.market === "pitch_speed_ou") return fmtNum(m.predicted_value, 2) + " mph";
  if (m.market === "ab_pitches_ou")  return fmtNum(m.predicted_value, 2);
  return m.recommendation ? `${m.recommendation} ${fmtPct(m.predicted_value)}` : "—";
}

function shortDescription(desc) {
  if (!desc) return "";
  return desc.replace(/_blocked$/, "");
}

function renderPaLog(pitches) {
  if (!pitches || !pitches.length) {
    return `<div class="pa-log"><span class="pa-empty">no pitches yet in this PA</span></div>`;
  }
  const chips = pitches.map(p => {
    const num = p.pitch_number !== null && p.pitch_number !== undefined ? `#${p.pitch_number}` : "";
    const type = p.pitch_type || "??";
    const spd = p.start_speed !== null && p.start_speed !== undefined ? `${fmtNum(p.start_speed, 1)}` : "—";
    const desc = shortDescription(p.description) || p.result_category || "—";
    const zone = p.zone !== null && p.zone !== undefined ? `z${p.zone}` : "";
    return `<span class="pitch">
      <span class="num">${num}</span>
      <span class="type">${type}</span>
      <span class="spd">${spd}</span>
      <span class="num">${zone}</span>
      <span class="res">${desc}</span>
    </span>`;
  }).join("");
  return `<div class="pa-log">${chips}</div>`;
}

function renderMarketRow(m) {
  const edgeCell = (m.edge === null || m.edge === undefined)
    ? `<td class="num neg">—</td>`
    : `<td class="num">${fmtPct(m.edge, 2)}</td>`;
  return `
    <tr>
      <td>${MARKET_LABEL[m.market] || m.market}</td>
      <td>${fmtPrediction(m)}</td>
      <td class="num">${m.line === null || m.line === undefined ? "—" : fmtNum(m.line, 2)}</td>
      ${edgeCell}
      <td class="num">${fmtNum(m.confidence, 3)}</td>
      <td class="num">${m.sample_size ?? 0}</td>
    </tr>
  `;
}

function renderPlayers(g) {
  const pitcher = g.pitcher_name || (g.situation && g.situation.pitcher_id ? `#${g.situation.pitcher_id}` : "—");
  const batter  = g.batter_name  || (g.situation && g.situation.batter_id  ? `#${g.situation.batter_id}`  : "—");
  return `
    <div class="players">
      <span class="label">Pitcher:</span> <span class="name">${pitcher}</span>
      <span class="vs">vs</span>
      <span class="label">Batter:</span> <span class="name">${batter}</span>
    </div>
  `;
}

function renderCard(g) {
  const s = g.situation || {};
  const rows = (g.markets || []).map(renderMarketRow).join("");
  return `
    <div class="card">
      <div class="card-head">
        <span class="matchup">${g.game_label}</span>
        <span class="sit">
          <span class="half">${s.half || ""}${s.inning ?? "?"}</span>
          · <span class="count">${s.count ?? "?-?"}</span>
          · ${s.outs ?? "?"} out
          · pitch ${s.pitch_count_pa ?? 0}
        </span>
      </div>
      ${renderPlayers(g)}
      ${renderPaLog(g.current_pa_pitches)}
      <table>
        <thead>
          <tr>
            <th>Market</th><th>Prediction</th><th>Line</th>
            <th>Edge</th><th>Conf</th><th>Samples</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function showError(msg) {
  $("err").innerHTML = msg ? `<div class="err">${msg}</div>` : "";
}

async function refresh() {
  try {
    const r = await fetch(`${API}/live`);
    if (!r.ok) throw new Error(`/live -> ${r.status}`);
    const games = await r.json();
    showError("");
    setText("countBadge", `${games.length} game${games.length === 1 ? "" : "s"}`);
    if (!games.length) {
      $("content").innerHTML = `<div class="empty">No live games. Last checked ${new Date().toLocaleTimeString()}.</div>`;
    } else {
      $("content").innerHTML = `<div class="grid">${games.map(renderCard).join("")}</div>`;
    }
    setText("stamp", new Date().toLocaleTimeString());
  } catch (e) {
    console.error("refresh failed", e);
    showError(`Fetch failed: ${e.message} (showing last successful data if any)`);
  }
}

$("refreshBtn").addEventListener("click", refresh);
refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
