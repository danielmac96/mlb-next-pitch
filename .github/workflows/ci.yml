name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest tests/ -q

  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Typecheck edge functions
        run: |
          for fn in api backfill daily-ingest live-poll odds-ingest settle; do
            echo "== $fn"
            deno check "supabase/functions/$fn/index.ts"
          done

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Apply core + training migrations
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "create role anon; create role authenticated;"
          psql -h localhost -U postgres -v ON_ERROR_STOP=1 \
            -f supabase/migrations/20260703000001_core_schema.sql
          psql -h localhost -U postgres -v ON_ERROR_STOP=1 \
            -f supabase/migrations/20260703000003_training_rpcs.sql
          # idempotency: re-apply core
          psql -h localhost -U postgres -v ON_ERROR_STOP=1 \
            -f supabase/migrations/20260703000001_core_schema.sql
